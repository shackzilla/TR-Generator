<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>15th MEU Training Report Generator</title>

<style>

/* ===== MARPAT BACKGROUND ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #3b4a3f;
    background-image:
        repeating-linear-gradient(45deg, #3b4a3f 0px, #3b4a3f 4px, #2f3a31 4px, #2f3a31 8px),
        repeating-linear-gradient(-45deg, #4f5f4f 0px, #4f5f4f 6px, #3b4a3f 6px, #3b4a3f 12px);
}

/* ===== PAPER CONTAINER ===== */
.container {
    max-width: 850px;        /* About paper width */
    margin: 40px auto;       /* Center horizontally */
    background-color: #1c1f1c;
    padding: 40px;
    color: #d4d4d4;
    border-radius: 6px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* ===== HEADERS ===== */
h1 {
    text-align: center;
    color: #4CAF50;
}

/* ===== FORM ELEMENTS ===== */
label {
    font-weight: bold;
    display: block;
    margin-top: 15px;
}

input, textarea, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    background-color: #2b2f2b;
    color: #fff;
    border: 1px solid #555;
    border-radius: 4px;
}

button {
    margin-top: 15px;
    padding: 10px;
    background-color: #4CAF50;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
}

button:hover {
    background-color: #45a049;
}

/* ===== GENERATED REPORT ===== */
#generatedReport {
    background-color: #111;
    padding: 20px;
    margin-top: 30px;
    white-space: pre-wrap;
    border: 1px solid #444;
}

/* ===== PRINT FRIENDLY ===== */
@media print {
    body {
        background: white;
    }
    .container {
        box-shadow: none;
        background: white;
        color: black;
        max-width: 100%;
        margin: 0;
    }
    button {
        display: none;
    }
}

</style>
</head>

<body>

<div class="container">

<h1>15th MEU(SOC) Realism Unit Training Report Generator</h1>

<label>UNIT REPORTING:</label>
<select id="unitReporting" required>
  <option value="">Select Unit</option>
  <option>Outlaw 1</option>
  <option>Outlaw 1-1</option>
  <option>Outlaw 1-2</option>
  <option>Outlaw 1-3</option>
  <option>Outlaw 1-1-A</option>
  <option>Outlaw 1-1-B</option>
  <option>Outlaw 1-1-C</option>
  <option>Outlaw 1-2-A</option>
  <option>Outlaw 1-2-B</option>
  <option>Outlaw 1-2-C</option>
  <option>Outlaw 1-3-A</option>
  <option>Outlaw 1-3-B</option>
  <option>Outlaw 1-3-C</option>
</select>

<label>TYPE OF TRAINING:</label>
<select id="typeOfTraining" required onchange="checkRescheduled()">
  <option value="">Select Training Type</option>
  <option>Scheduled Platoon Training</option>
  <option>Scheduled Squad Training</option>
  <option>Scheduled Fireteam Training</option>
  <option>Rescheduled Platoon Training</option>
  <option>Rescheduled Squad Training</option>
  <option>Rescheduled Fireteam Training</option>
</select>

<div id="rescheduleLinkContainer" style="display:none;">
  <label>Link to Rescheduled Training Report (COC Notification Proof):</label>
  <input type="url" id="rescheduleLink">
</div>

<label>DATE & TIME CONDUCTED:</label>
<input type="text" id="dateTime" placeholder="Enter manually (e.g., 14 APR 2026 | 1900 CST)">

<label>ATTENDEES:</label>
<textarea id="attendees" rows="4"></textarea>

<label>ABSENT:</label>
<textarea id="absent" rows="3"></textarea>

<label>FILL-IN'S:</label>
<textarea id="fillIns" rows="3"></textarea>

<label>TRAINING CONDUCTED:</label>
<textarea id="trainingConducted" rows="5"></textarea>

<label>COMMENTS:</label>
<textarea id="comments" rows="4"></textarea>

<label>SUSTAINS: (Required)</label>
<textarea id="sustains" rows="4" required></textarea>

<label>IMPROVES: (Required)</label>
<textarea id="improves" rows="4" required></textarea>

<label>Respectfully Submitted,</label>
<select id="submittedBy"></select>

<button onclick="generateReport()">Generate Report</button>
<button onclick="copyReport()">Copy to Clipboard</button>
<button onclick="window.print()">Print / Save as PDF</button>

<h2>Generated Report</h2>
<div id="generatedReport"></div>

</div>

<script>

// ===== ROSTER =====
const roster = [
    { rank: "Capt", name: "Riske" },
    { rank: "1stLt", name: "Rose" },
    { rank: "GySgt", name: "Smith" },
    { rank: "SSgt", name: "Johnson" },
    { rank: "Sgt", name: "Williams" },
    { rank: "Cpl", name: "Davis" },
    { rank: "LCpl", name: "Brown" },
    { rank: "PFC", name: "Martinez" }
];

const rankOrder = ["Capt","1stLt","2ndLt","GySgt","SSgt","Sgt","Cpl","LCpl","PFC","Pvt"];

function populateSubmitter() {
    const select = document.getElementById("submittedBy");
    const sorted = roster.sort((a,b) => rankOrder.indexOf(a.rank) - rankOrder.indexOf(b.rank));
    sorted.forEach(member => {
        const option = document.createElement("option");
        option.value = `${member.rank} ${member.name}`;
        option.textContent = `${member.rank} ${member.name}`;
        select.appendChild(option);
    });
}
populateSubmitter();

function checkRescheduled() {
    const trainingType = document.getElementById("typeOfTraining").value;
    const container = document.getElementById("rescheduleLinkContainer");
    if (trainingType.includes("Rescheduled")) {
        container.style.display = "block";
    } else {
        container.style.display = "none";
        document.getElementById("rescheduleLink").value = "";
    }
}

function generateReport() {

    const trainingType = document.getElementById("typeOfTraining").value;
    const rescheduleLink = document.getElementById("rescheduleLink").value;

    if (!document.getElementById("unitReporting").value ||
        !trainingType ||
        !document.getElementById("sustains").value ||
        !document.getElementById("improves").value) {
        alert("All required fields must be completed.");
        return;
    }

    if (trainingType.includes("Rescheduled") && !rescheduleLink) {
        alert("Rescheduled training requires a notification link.");
        return;
    }

    let rescheduleSection = "";
    if (rescheduleLink) {
        rescheduleSection = `
RESCHEDULE NOTIFICATION LINK:
${rescheduleLink}
`;
    }

    const report = `
UNIT REPORTING:
${document.getElementById("unitReporting").value}

TYPE OF TRAINING:
${trainingType}
${rescheduleSection}
DATE & TIME CONDUCTED:
${document.getElementById("dateTime").value}

ATTENDEES:
${document.getElementById("attendees").value}

ABSENT:
${document.getElementById("absent").value}

FILL-IN'S:
${document.getElementById("fillIns").value}

TRAINING CONDUCTED:
${document.getElementById("trainingConducted").value}

COMMENTS:
${document.getElementById("comments").value}

SUSTAINS:
${document.getElementById("sustains").value}

IMPROVES:
${document.getElementById("improves").value}

Respectfully Submitted,
${document.getElementById("submittedBy").value}
`;

    document.getElementById("generatedReport").innerText = report;
}

function copyReport() {
    const text = document.getElementById("generatedReport").innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert("Report copied to clipboard.");
    });
}

</script>

</body>
</html>
